seed: 13
device: auto
run_dir: runs/vae_minigrid
fig_dir: reports/figures

env:
  id: MiniGrid-Empty-16x16-v0
  image_size: 64

dataset:
  path: runs/datasets/minigrid_empty_100k.npz
  collect_if_missing: false
  num_frames: 100000

model:
  type: vae
  in_channels: 3
  latent_dim: 64
  beta: 1.0

visualization:
  checkpoint: runs/vae_minigrid/best.pt
  num_points: 3000
  method: pca

