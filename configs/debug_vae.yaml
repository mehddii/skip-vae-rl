seed: 7
device: auto
run_dir: runs/debug_vae
fig_dir: reports/figures

env:
  id: MiniGrid-Empty-8x8-v0
  image_size: 64

dataset:
  path: runs/datasets/minigrid_empty_debug.npz
  collect_if_missing: true
  num_frames: 1000

model:
  type: skip_vae
  in_channels: 3
  latent_dim: 32
  beta: 1.0

training:
  batch_size: 64
  epochs: 2
  learning_rate: 0.0003
  num_workers: 2
  save_every_epochs: 1

