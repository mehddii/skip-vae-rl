seed: 31
device: auto
run_dir: runs/skip_vae_regularized_doorkey
fig_dir: reports/figures

env:
  id: MiniGrid-DoorKey-8x8-v0
  image_size: 64

dataset:
  path: runs/datasets/minigrid_doorkey_80k.npz
  collect_if_missing: true
  num_frames: 80000

model:
  type: skip_vae
  in_channels: 3
  latent_dim: 64
  beta: 0.1
  skip_dropout: 0.5
  skip_scale: 0.5

training:
  batch_size: 128
  epochs: 30
  learning_rate: 0.0003
  num_workers: 2
  save_every_epochs: 5

