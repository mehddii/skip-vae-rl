seed: 51
device: auto
run_dir: runs/skip_vae_regularized_carracing
fig_dir: reports/figures

env:
  id: CarRacing-v3
  image_size: 64

dataset:
  path: runs/datasets/carracing_80k.npz
  collect_if_missing: false
  num_frames: 80000

model:
  type: skip_vae
  in_channels: 3
  latent_dim: 64
  beta: 0.1
  skip_dropout: 0.5
  skip_scale: 0.5

visualization:
  checkpoint: runs/skip_vae_regularized_carracing/best.pt
  num_points: 3000
  method: pca

